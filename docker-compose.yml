version: "3.8"

x-api-common: &api-common
  build:
    context: ./backend
    dockerfile: Dockerfile
  environment:
    - NODE_ENV=production
    - PORT=5000
    - MONGODB_URI=mongodb://mongo:27017/velox
    - REDIS_URL=redis://redis:6379
    - CLIENT_URL=${CLIENT_URL:-http://localhost}
    - JWT_ACCESS_SECRET=${JWT_ACCESS_SECRET}
    - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    - JWT_ACCESS_EXPIRY=${JWT_ACCESS_EXPIRY:-15m}
    - JWT_REFRESH_EXPIRY=${JWT_REFRESH_EXPIRY:-7d}
    - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
    - API_KEY_SECRET=${API_KEY_SECRET:-}
  depends_on:
    mongo:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  api-1:
    <<: *api-common
    container_name: velox_api_1
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api-2:
    <<: *api-common
    container_name: velox_api_2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  api-3:
    <<: *api-common
    container_name: velox_api_3
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: velox_frontend
    depends_on:
      - api-1

  nginx:
    image: nginx:alpine
    container_name: velox_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - api-1
      - api-2
      - api-3

  mongo:
    image: mongo:6
    container_name: velox_mongo
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh 127.0.0.1:27017/test --quiet
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 40s

  redis:
    image: redis:7-alpine
    container_name: velox_redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  redis-data:
